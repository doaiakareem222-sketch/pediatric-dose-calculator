<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PediaDose AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🩺 PediaDose AI</h1>

<p class="subtitle">
حاسبة جرعات الأطفال بالذكاء الاصطناعي
</p>

<div class="card">

<label>اسم الدواء</label>

<select id="drug">

<option value="">اختر الدواء</option>

<option value="paracetamol">Paracetamol</option>

<option value="ibuprofen">Ibuprofen</option>

<option value="amoxicillin">Amoxicillin</option>

</select>

<label>العمر (بالسنوات)</label>

<input
type="number"
id="age"
placeholder="مثال: 5">

<label>الوزن (Kg)</label>

<input
type="number"
id="weight"
placeholder="مثال: 18">

<button id="calculate">
احسب الجرعة
</button>

<div id="result"></div>

</div>

</div>

<script src="drugs.js"></script>
<script src="script.js"></script>

</body>
</html>
