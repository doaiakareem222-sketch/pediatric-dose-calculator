<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PediaDose AI</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🩺 PediaDose AI</h1>

<p class="subtitle">
حاسبة جرعات الأطفال بالذكاء الاصطناعي
</p>

<div class="card">

<label>اسم الدواء</label>

<select id="drug">
<option value="">اختر الدواء</option>
<option value="paracetamol">Paracetamol</option>
<option value="ibuprofen">Ibuprofen</option>
<option value="amoxicillin">Amoxicillin</option>
<option value="azithromycin">Azithromycin</option>
<option value="cefixime">Cefixime</option>
<option value="metronidazole">Metronidazole</option>
</select>

<label>العمر (بالسنوات)</label>

<input
type="number"
id="age"
placeholder="مثال: 5">

<label>الوزن (Kg)</label>

<input
type="number"
id="weight"
placeholder="مثال: 18">

<button id="calculate">
احسب الجرعة
</button>

<div id="result"></div>

</div>

<!-- About Section -->
<div class="about-card">

<h2>ℹ️ About PediaDose AI</h2>

<p>
PediaDose AI هو مشروع يساعد في حساب جرعات الأطفال اعتماداً على الوزن
والمراجع الدوائية القياسية.
</p>

<p>
⚠️ النتائج لغرض التعليم والمراجعة فقط، ولا تغني عن استشارة الطبيب أو الصيدلي.
</p>

<p class="copyright">
Developed by Doaa Kareem © 2026
</p>

</div>

</div>

<script src="drugs.js"></script>
<script src="script.js"></script>

</body>

</html>
